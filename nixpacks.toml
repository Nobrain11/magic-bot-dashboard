[phases.setup]
nixPkgs = ["nodejs_22", "pnpm", "python312", "python312Packages.pip"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm run typecheck:libs",
  "pnpm --filter @workspace/magic-dashboard exec vite build --config vite.config.railway.ts",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/db run push-force && node artifacts/api-server/dist/index.mjs"
